agent:
  action_dim: 6
  batch_size: 64
  epsilon_decay: 0.9998
  epsilon_end: 0.05
  epsilon_start: 1.0
  gamma: 0.99
  hidden_sizes:
  - 256
  - 256
  lr: 0.0005
  memory_size: 50000
  state_dim: 15
  target_update_freq: 500
drone:
  boundary_radius: 8.0
  intercept_threshold: 0.8
  velocity_magnitude: 1.0
evader:
  direction_change_interval: 2.0
  speeds:
    fast: 1.5
    slow: 0.5
    static: 0.0
perception:
  mode: yolo
reward:
  close_bonus: 10.0
  heading_bonus: 0.5
  progress_reward_scale: 5.0
  proximity_bonus: 2.0
  step_dist_penalty: -0.1
  terminal_reward: 100.0
  vision_penalty: -1.0
training:
  max_episodes: 3000
  max_steps_per_episode: 200
  save_every: 25
